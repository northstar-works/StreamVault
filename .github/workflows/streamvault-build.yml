name: Build & Release StreamVault

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: streamvault-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          validate-wrappers: false

      - name: Add signing config to build
        run: |
          cat > app/signing.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file("$rootDir/streamvault.p12")
                      storePassword "streamvault123"
                      keyAlias "streamvault"
                      keyPassword "streamvault123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

          if ! grep -q 'apply from: "signing.gradle"' app/build.gradle; then
            echo '' >> app/build.gradle
            echo 'apply from: "signing.gradle"' >> app/build.gradle
          fi

      - name: Build release APKs
        run: gradle --no-daemon assembleMobileRelease assembleTvRelease

      - name: Verify APKs exist
        run: |
          echo "Built APKs:"
          find app/build/outputs/apk -type f -name "*.apk" -print
          find app/build/outputs/apk -type f -name "*.apk" | grep -q . || (echo "No APKs found" && exit 1)

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamVault-release-bundle
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Push APKs to fdroid repo
        env:
          FDROID_TOKEN: ${{ secrets.FDROID_REPO_TOKEN }}
        run: |
          MOBILE_APK=$(find app/build/outputs/apk -name "*mobile*release*.apk" | head -1)
          TV_APK=$(find app/build/outputs/apk -name "*tv*release*.apk" | head -1)

          git clone \
            "https://x-access-token:${FDROID_TOKEN}@github.com/northstar-works/fdroid.git" \
            fdroid

          mkdir -p fdroid/repo

          # Replace old StreamVault APKs
          rm -f fdroid/repo/StreamVault-*mobile*.apk
          rm -f fdroid/repo/StreamVault-*tv*.apk

          [ -n "$MOBILE_APK" ] && cp "$MOBILE_APK" fdroid/repo/
          [ -n "$TV_APK" ]     && cp "$TV_APK"     fdroid/repo/

          cd fdroid
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/

          if git diff --cached --quiet; then
            echo "No APK change, skipping."
          else
            VERSION=$(grep -oP 'versionName "\K[^"]+' ../app/build.gradle | head -1)
            git commit -m "chore: update StreamVault APKs to v${VERSION}"
            git push
          fi

  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: StreamVault-release-bundle

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.apk"
          generate_release_notes: true
